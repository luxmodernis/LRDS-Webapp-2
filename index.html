<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Chasse aux ingrédients</title>
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>

<!-- ── PASSWORD GATE ── -->
<div id="passwordGate" class="pw-gate">
  <div class="pw-box">
    <div class="pw-logo">
      <svg viewBox="0 0 153 52" xmlns="http://www.w3.org/2000/svg" aria-label="Les Rituels de Soin">
        <text x="76.5" y="18" text-anchor="middle" font-family="Georgia,serif" font-size="13" letter-spacing="2" fill="#000">LES RITUELS</text>
        <text x="76.5" y="38" text-anchor="middle" font-family="Georgia,serif" font-size="16" letter-spacing="3" fill="#000">DE SOIN</text>
      </svg>
    </div>
    <p class="pw-label">Accès protégé</p>
    <div class="pw-field-wrap">
      <input
        id="pwInput"
        class="pw-input"
        type="password"
        placeholder="Mot de passe"
        autocomplete="current-password"
        aria-label="Mot de passe"
      >
      <button id="pwSubmit" class="btn-pill pw-submit" type="button">ENTRER</button>
    </div>
    <p class="pw-error" id="pwError" aria-live="polite"></p>
  </div>
</div>

<div id="app">

  <!-- ── INSTRUCTION / CONSIGNE ── -->
  <div class="text-zone">
    <p class="instruction-text" id="instructionText"></p>
  </div>

  <!-- ── QUIT BUTTON (hauteur 0, ne perturbe pas le layout) ── -->
  <div class="btn-quit-wrap" id="btnQuitWrap">
    <button class="btn-pill" id="btnQuit">QUITTER</button>
  </div>

  <!-- ── PANORAMIC ── -->
  <div class="panoramic-section">
    <div class="panoramic-wrapper" id="panoramicWrapper">
      <div class="panoramic-track" id="panoramicTrack">
        <img alt="" class="panoramic-img" id="panoramicImg" draggable="false">
        <!-- Plus buttons injected by script.js -->
      </div>
    </div>
  </div>

  <!-- ── PROGRESS STRIP (sous le diapo) ── -->
  <div class="progress-strip">
    <div class="progress-track" id="progressTrack">
      <div class="progress-dot" id="progressDot"></div>
    </div>
  </div>

</div><!-- /#app -->


<!-- ── MODAL OVERLAY ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet">

    <div class="modal-title-wrap">
      <h1 class="modal-title" id="modalTitle"></h1>
    </div>

    <div class="modal-products" id="modalProducts">
      <!-- Produits injectés par script.js -->
    </div>

    <div class="modal-footer">
      <button class="btn-pill" id="btnRetour">RETOUR</button>
    </div>

  </div>
</div>


<script src="scorm.js?v=1"></script>
<script src="script.js?v=6"></script>
</body>
</html>
