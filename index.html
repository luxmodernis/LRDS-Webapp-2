<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Les Rituels de Soin</title>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<!-- ── PASSWORD GATE ── -->
<div id="passwordGate" class="pw-gate">
  <div class="pw-box">
    <div class="pw-logo">
      <svg viewBox="0 0 153 52" xmlns="http://www.w3.org/2000/svg" aria-label="Les Rituels de Soin">
        <text x="76.5" y="18" text-anchor="middle" font-family="Georgia,serif" font-size="13" letter-spacing="2" fill="#000">LES RITUELS</text>
        <text x="76.5" y="38" text-anchor="middle" font-family="Georgia,serif" font-size="16" letter-spacing="3" fill="#000">DE SOIN</text>
      </svg>
    </div>
    <p class="pw-label">Accès protégé</p>
    <div class="pw-field-wrap">
      <input
        id="pwInput"
        class="pw-input"
        type="password"
        placeholder="Mot de passe"
        autocomplete="current-password"
        aria-label="Mot de passe"
      >
      <button id="pwSubmit" class="btn-pill pw-submit" type="button">ENTRER</button>
    </div>
    <p class="pw-error" id="pwError" aria-live="polite"></p>
  </div>
</div>

<div id="app">

  <!-- ── INSTRUCTION ── -->
  <div class="text-zone">
    <p class="instruction-text" id="instructionText">
      Explorer la panoramique et cliquez sur tous les PLUS pour découvrir les soins.
    </p>
  </div>

  <!-- ── QUIT BUTTON (hauteur 0, ne perturbe pas le layout) ── -->
  <div class="btn-quit-wrap" id="btnQuitWrap">
    <button class="btn-pill" id="btnQuit">QUITTER</button>
  </div>

  <!-- ── PANORAMIC ── -->
  <div class="panoramic-section">
    <div class="panoramic-wrapper" id="panoramicWrapper">
      <div class="panoramic-track" id="panoramicTrack">
        <img src="" alt="Panoramique des soins" class="panoramic-img" id="panoramicImg" draggable="false">
        <!-- Plus buttons injected by script.js -->
      </div>
    </div>
  </div>

  <!-- ── PROGRESS STRIP (sous le diapo) ── -->
  <div class="progress-strip">
    <div class="progress-track" id="progressTrack">
      <div class="progress-dot" id="progressDot"></div>
    </div>
  </div>

</div><!-- /#app -->


<!-- ── MODAL OVERLAY ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet">

    <!-- Titre fixe — ne slide pas -->
    <div class="modal-title-wrap">
      <h1 class="modal-title" id="modalTitle"></h1>
    </div>

    <!-- Pages track — slide horizontalement -->
    <div class="modal-pages-track" id="modalPagesTrack">

      <!-- Page 1 : image + texte + SUITE -->
      <div class="modal-page" id="modalPage1">
        <div class="modal-img-wrap">
          <img src="" alt="" class="modal-img" id="modalImg" draggable="false">
        </div>
        <div class="modal-gradient"></div>
        <div class="modal-text-area">
          <div class="modal-text" id="modalText"></div>
        </div>
        <div class="modal-footer">
          <button class="btn-pill" id="btnSuite">SUITE</button>
        </div>
      </div>

      <!-- Page 2 : packshot + consigne + étiquette + RETOUR -->
      <div class="modal-page" id="modalPage2">
        <div class="modal-packshot" id="modalPackshot">
          <!-- packshot image — placeholder -->
          <img src="" alt="" class="modal-packshot-img" id="modalPackshotImg" draggable="false">
        </div>
        <div class="modal-page2-content">
          <p class="modal-consigne" id="modalConsigne"></p>
          <img src="" alt="Étiquette produit" class="modal-label-img" id="modalLabelImg" draggable="false">
        </div>
        <div class="modal-footer">
          <button class="btn-pill" id="btnRetour">RETOUR</button>
        </div>
      </div>

    </div><!-- /.modal-pages-track -->

  </div>
</div>


<script src="scorm.js?v=1"></script>
<script src="script.js?v=5"></script>
</body>
</html>
